services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: platzi-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SERVER_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"  # Cambiado de 1433:1433 a 1434:1433
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - platzi-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: platzi-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platzi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # WebAPI .NET 10
  webapi:
    build:
      context: ./src
      dockerfile: ../Dockerfile
    container_name: platzi-webapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Basic Auth
      - BasicAuth__Username=${BASIC_AUTH_USER}
      - BasicAuth__Password=${BASIC_AUTH_PASSWORD}
      # Connection Strings
      - ConnectionStrings__SQL_DB=Server=sqlserver;Database=${SQL_DB_NAME};User Id=sa;Password=${SQL_SERVER_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__POSTGRES_DB=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - platzi-network
    restart: on-failure

volumes:
  sqlserver_data:
    driver: local
  postgres_data:
    driver: local

networks:
  platzi-network:
    driver: bridge